version: "3.9"

services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-YourStrong!Passw0rd}
    ports:
      - "1433:1433"

  app:
    build: .
    depends_on:
      - sqlserver
    env_file: .env
    volumes:
      - ./data:/app/data
